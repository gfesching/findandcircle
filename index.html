  <style>
    :root {
      --ink: #252016;
      --orange: #e5681b;
      --cream: #fff8e8;
      --paper: #fffdf4;
      --green: #3e9f62;
      --red: #d54d43;
      --line: #d69a42;
    }

    * { box-sizing: border-box; }

    body {
      width: 100%;
      margin: 0;
      min-width: 320px;
      color: var(--ink);
      font-family: "Noto Sans TC", "DM Sans", sans-serif;
    }

    button, canvas { touch-action: none; }

    .worksheet-shell {
      width: 100%;
      min-height: calc(100 * min(var(--vh, 1vh), 1vh));
      position: relative;
      overflow: hidden;
      padding: 28px 18px 44px;
      background:
        radial-gradient(circle at 10% 8%, rgba(255, 235, 177, .34) 0 3%, transparent 16%),
        radial-gradient(circle at 84% 22%, rgba(255, 232, 163, .28) 0 4%, transparent 18%),
        linear-gradient(145deg, #9d310d 0%, #e36916 28%, #f4b147 59%, #bc3e11 100%);
    }

    .worksheet-shell::before,
    .worksheet-shell::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: .7;
    }

    .worksheet-shell::before {
      width: 340px;
      height: 340px;
      left: -150px;
      bottom: -170px;
      background: rgba(118, 36, 5, .38);
    }

    .worksheet-shell::after {
      width: 260px;
      height: 260px;
      right: -120px;
      top: -80px;
      background: rgba(255, 227, 142, .28);
    }

    .page-content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
    }

    .paper-card {
      position: relative;
      background:
        radial-gradient(circle at 15% 14%, rgba(239, 205, 129, .22), transparent 28%),
        radial-gradient(circle at 85% 90%, rgba(239, 205, 129, .20), transparent 30%),
        var(--paper);
      box-shadow: 0 14px 0 rgba(108, 35, 7, .17), 0 22px 38px rgba(85, 28, 8, .35);
    }

    .paper-card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 2px solid rgba(183, 98, 30, .20);
      border-radius: 24px;
      pointer-events: none;
    }

    .student-field {
      border: 2px dashed var(--line);
      border-radius: 18px;
      padding: 13px 15px;
      background: rgba(255, 244, 201, .8);
    }

    .student-field input {
      width: 100%;
      border: 0;
      border-bottom: 2px solid #b7772b;
      outline: none;
      background: transparent;
      color: #3e2a16;
      padding: 5px 2px;
      font-size: 1rem;
      font-weight: 700;
    }

    .student-field input:focus {
      border-bottom-color: var(--orange);
      box-shadow: 0 3px 0 rgba(229, 104, 27, .14);
    }

    .seat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(28px, 1fr));
      gap: 4px;
    }

    .seat-button {
      min-height: 26px;
      border: 1px solid #e4bd76;
      border-radius: 6px;
      background: #fff8de;
      color: #70451d;
      font-weight: 800;
      font-size: .75rem;
      transition: transform 150ms ease, background 150ms ease, color 150ms ease, box-shadow 150ms ease;
    }

    .seat-button:hover {
      transform: translateY(-1px);
      background: #ffd982;
    }

    .seat-button.is-selected {
      border-color: #8d310c;
      background: #e5681b;
      color: white;
      box-shadow: 0 1px 0 rgba(128, 47, 13, .25);
    }

    .seat-button.is-submitted {
      background: #dff3dc;
      border-color: #67ad73;
      color: #236238;
    }

    .seat-button.is-selected.is-submitted {
      background: #3e9f62;
      color: white;
      border-color: #236238;
    }

    .staff-stage {
      position: relative;
      overflow: hidden;
      border: 2px solid #d39137;
      border-radius: 20px;
      background: #fdf5e2;
    }

    .staff-paper {
      position: relative;
      width: 100%;
      height: 0;
      padding-bottom: 55%; /* 保持 1.8:1 黃金比例，確保音符按鈕完美覆蓋背景 */
    }

    .staff-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      z-index: 1;
    }

    .staff-row {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    .note-button {
      position: absolute;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      height: 46px;
      margin-left: -23px; /* 完美居中對齊百分比 */
      margin-top: -23px;  /* 完美居中對齊百分比 */
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      transition: transform 160ms ease;
    }

    .note-button:hover { transform: scale(1.15); }

    .note-button::before {
      content: "";
      position: absolute;
      width: 44px;
      height: 44px;
      border: 4px solid transparent;
      border-radius: 50%;
      transition: border-color 160ms ease, transform 160ms ease;
    }

    .note-button.is-selected::before {
      border-color: #e12d2d;
      transform: scale(1.05);
      box-shadow: 0 0 0 3px rgba(225, 45, 45, .25);
    }

    /* 精準對齊第三行五線譜上對應的空心音符中心位置 - 修正位置向下移動 */
    .note-do { left: 23.3%; top: 77.7%; }
    .note-re { left: 32.5%; top: 76.2%; } /* 往下0.1行 (約+1.2%) */
    .note-mi { left: 42.3%; top: 74.0%; } /* 往右0.1行 (約+1.0%) */
    .note-fa { left: 51.6%; top: 72.4%; } /* 往上0.01行 (約-0.12% 行, top 減去約1.2%) */
    .note-sol { left: 61.2%; top: 71.3%; } /* 往右0.1行 (約+1.0%), 往上0.1行 (約-1.2%) */
    .note-la { left: 70.3%; top: 70.3%; } /* 往上0.01行 (約-1.2% 改為 top: 70.3%) */
    .note-si { left: 79.1%; top: 68.1%; } /* 往上0.3行 (約-3.6%) */

    .selection-chip {
      border: 1px solid #e5b15d;
      border-radius: 999px;
      background: #fff2c4;
      color: #7a3e14;
      padding: 5px 10px;
      font-size: .9rem;
      font-weight: 900;
    }

    .draw-area {
      position: relative;
      min-height: 300px;

      border-radius: 22px;

    }

    #drawingCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .tool-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 10px 15px;
      border: 2px solid transparent;
      border-radius: 14px;
      font-weight: 800;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }

    .tool-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 7px 14px rgba(98, 54, 10, .18);
    }

    .tool-button.is-active {
      border-color: var(--ink);
      box-shadow: 0 0 0 4px rgba(37, 32, 22, .12);
    }

    .color-swatch.is-active-swatch {
      border-color: #252016 !important;
      transform: scale(1.15);
      box-shadow: 0 4px 6px rgba(0, 0, 0, .12);
    }

    .review-detail { display: none; }
    .review-detail.is-visible { display: block; }
    .review-empty.is-hidden { display: none; }

    .review-staff {
      position: relative;
      height: 128px;
      overflow: hidden;
      border: 1px solid #f0c575;
      border-radius: 12px;
      background: #fffdf4;
    }

    .review-row {
      position: absolute;
      inset: 0px 10px auto;
      height: 128px;
    }

    .review-row::before {
      display: none;
    }

    .review-note {
      position: absolute;
      width: 18px;
      height: 18px;
      border: 3px solid #d9342e;
      border-radius: 50%;
      z-index: 2;
      display: none;
      box-shadow: 0 0 0 2px rgba(217, 52, 46, .1);
    }

    .review-note.is-selected { display: block; }
    .review-note-do { left: 21.6%; top: 62.5px; }
    .review-note-re { left: 31.4%; top: 57px; }
    .review-note-mi { left: 41.2%; top: 51px; }
    .review-note-fa { left: 51.0%; top: 45px; }
    .review-note-sol { left: 60.6%; top: 39px; }
    .review-note-la { left: 70.3%; top: 33px; }
    .review-note-si { left: 80.0%; top: 27px; }

    button:focus-visible,
    input:focus-visible {
      outline: 3px solid #005fcc;
      outline-offset: 3px;
    }

    @media (max-width: 640px) {
      .worksheet-shell { padding: 16px 10px 30px; }
      .paper-card::before { inset: 7px; }
      .seat-button { min-height: 38px; font-size: .9rem; }
      .staff-paper { padding-left: 4px; padding-right: 4px; }
      .staff-row::before { left: -2px; font-size: 76px; top: -10px; }
      .note-button { width: 42px; height: 54px; }
      .note-head { width: 15px; height: 11px; }
      .note-stem { left: 28px; height: 30px; }
      .note-do .note-stem,
      .note-re .note-stem,
      .note-mi .note-stem { left: 12px; }
      .note-label { font-size: .68rem; }
      .draw-area { min-height: 260px; }
    }

      const classNameInput = document.getElementById("className");
      const selectedNotesText = document.getElementById("selectedNotesText");
      const selectedNotesChips = document.getElementById("selectedNotesChips");
      const clearNotesButton = document.getElementById("clearNotesButton");
      const submitButton = document.getElementById("submitButton");
      const submitStatus = document.getElementById("submitStatus");
      const submissionCount = document.getElementById("submissionCount");
      const reviewEmpty = document.getElementById("reviewEmpty");
      const reviewDetail = document.getElementById("reviewDetail");
      const closeReviewButton = document.getElementById("closeReviewButton");

      const canvas = document.getElementById("drawingCanvas");
      const drawArea = document.getElementById("drawArea");
      const context = canvas.getContext("2d");
      const penButton = document.getElementById("penButton");
      const eraserButton = document.getElementById("eraserButton");
      const clearButton = document.getElementById("clearButton");

      let selectedSeat = "";
      let selectedReviewSeat = "";
      let selectedNotes = new Set();
      let records = [];
      let sdkReady = false;
      let drawing = false;
      let tool = "pen";
      let brushColor = "#d54d43";
      let lastPoint = { x: 0, y: 0 };
      let strokes = [];
      let currentStroke = null;

      studentSeatGrid.innerHTML = seatNumbers.map((seat) =>
        '<button type="button" class="seat-button" data-seat="' + seat + '" role="radio" aria-checked="false">' + seat + '</button>'
      ).join("");

      teacherSeatGrid.innerHTML = seatNumbers.map((seat) =>
        '<button type="button" class="seat-button" data-review-seat="' + seat + '">' + seat + '</button>'
      ).join("");

      function noteClassName(note) {
        return note.toLowerCase();
      }

      function selectedNotesArray() {
        return noteOrder.filter((note) => selectedNotes.has(note));
      }

      function renderSelectedNotes() {
        const notes = selectedNotesArray();
        selectedNotesText.textContent = notes.length ? notes.map(n => notePositionsDesc[n] || n).join(", ") : "—";
        
        // Render chips representing the unique set of active notes in musical order
        selectedNotesChips.innerHTML = "";

        document.querySelectorAll(".note-button").forEach((button) => {
          const active = selectedNotes.has(button.dataset.note);
          button.classList.toggle("is-selected", active);
          button.setAttribute("aria-pressed", String(active));
        });
      }

      function setSelectedNotes(noteValues) {
        selectedNotes = new Set(noteOrder.filter((note) => noteValues.includes(note)));
        renderSelectedNotes();
      }

      function parseSelectedNotes(record) {
        if (!record) return [];
        if (typeof record.selected_notes === "string") {
          return record.selected_notes.split(",").map((item) => item.trim()).filter((item) => noteOrder.includes(item));
        }

        if (typeof record.staff_strokes === "string") {
          try {
            const parsed = JSON.parse(record.staff_strokes);
            return Array.isArray(parsed) ? parsed.filter((item) => noteOrder.includes(item)) : [];
          } catch (_) {
            return [];
          }
        }
        return [];
      }

      document.querySelectorAll(".note-button").forEach((button) => {
        button.addEventListener("click", () => {
          const note = button.dataset.note;
          if (selectedNotes.has(note)) {
            selectedNotes.delete(note);
          } else {
            selectedNotes.add(note);
          }
          renderSelectedNotes();
        });
      });

      clearNotesButton.addEventListener("click", () => {
        selectedNotes.clear();
        renderSelectedNotes();
      });

      function selectStudentSeat(seat) {
        selectedSeat = seat;
        document.querySelectorAll("#studentSeatGrid .seat-button").forEach((button) => {
          const active = button.dataset.seat === seat;
          button.classList.toggle("is-selected", active);
          button.setAttribute("aria-checked", String(active));
        });
      }

      document.querySelectorAll("#studentSeatGrid .seat-button").forEach((button) => {
        button.addEventListener("click", () => selectStudentSeat(button.dataset.seat));
      });

      function latestRecordsBySeat() {
        const latest = new Map();
        [...records]
          .sort((a, b) => new Date(a.submitted_at || 0).getTime() - new Date(b.submitted_at || 0).getTime())
          .forEach((record) => {
            if (record.seat_number) latest.set(String(record.seat_number).trim(), record);
          });
        return latest;
      }

      function recordForReviewSeat(seat) {
        return latestRecordsBySeat().get(String(seat).trim()) || null;
      }

      function updateTeacherGrid() {
        const latest = latestRecordsBySeat();

        document.querySelectorAll("#teacherSeatGrid .seat-button").forEach((button) => {
          const seat = button.dataset.reviewSeat;
          const submitted = latest.has(String(seat));
          const selected = String(selectedReviewSeat) === String(seat);

          button.classList.toggle("is-submitted", submitted);
          button.classList.toggle("is-selected", selected);
          button.setAttribute("aria-label", submitted
            ? "座號 " + seat + "，已繳交，點選查看"
            : "座號 " + seat + "，尚未繳交"
          );
        });

        submissionCount.textContent = latest.size + " / 25";
      }

      function prepareContext(ctx, ratio) {
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
      }

      function getCanvasPoint(event, targetCanvas) {
        const rect = targetCanvas.getBoundingClientRect();
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top
        };
      }

      function drawStroke(ctx, stroke) {
        if (!stroke.points || !stroke.points.length) return;

        ctx.save();
        ctx.globalCompositeOperation = stroke.tool === "eraser" ? "destination-out" : "source-over";
        ctx.strokeStyle = stroke.tool === "eraser" ? "rgba(0,0,0,1)" : stroke.color;
        ctx.lineWidth = stroke.width || 5;
        ctx.beginPath();
        ctx.moveTo(stroke.points[0].x, stroke.points[0].y);

        if (stroke.points.length === 1) {
          ctx.lineTo(stroke.points[0].x + 0.01, stroke.points[0].y + 0.01);
        } else {
          stroke.points.slice(1).forEach((point) => ctx.lineTo(point.x, point.y));
        }

        ctx.stroke();
        ctx.restore();
      }

      function redrawPracticeCanvas() {
        const ratio = window.devicePixelRatio || 1;
        context.clearRect(0, 0, canvas.width / ratio, canvas.height / ratio);
        strokes.forEach((stroke) => drawStroke(context, stroke));
      }

      function resizeCanvas() {
        const ratio = window.devicePixelRatio || 1;
        const drawRect = drawArea.getBoundingClientRect();
        canvas.width = Math.max(1, Math.floor(drawRect.width * ratio));
        canvas.height = Math.max(1, Math.floor(drawRect.height * ratio));
        canvas.style.width = drawRect.width + "px";
        canvas.style.height = drawRect.height + "px";
        prepareContext(context, ratio);
        redrawPracticeCanvas();
      }

      function setTool(nextTool) {
        tool = nextTool;
        const isPen = tool === "pen";
        penButton.classList.toggle("is-active", isPen);
        eraserButton.classList.toggle("is-active", !isPen);
        penButton.setAttribute("aria-pressed", String(isPen));
        eraserButton.setAttribute("aria-pressed", String(!isPen));
        canvas.style.cursor = isPen ? "crosshair" : "cell";
      }

      function beginStroke(event) {
        event.preventDefault();
        const point = getCanvasPoint(event, canvas);

        try {
          canvas.setPointerCapture(event.pointerId);
        } catch (_) {}

        const stroke = {
          tool: tool,
          color: brushColor,
          width: tool === "eraser" ? 22 : 5,
          points: [point]
        };

        drawing = true;
        lastPoint = point;
        currentStroke = stroke;
        strokes.push(stroke);

        context.save();
        context.globalCompositeOperation = tool === "eraser" ? "destination-out" : "source-over";
        context.fillStyle = tool === "eraser" ? "rgba(0,0,0,1)" : brushColor;
        context.beginPath();
        context.arc(point.x, point.y, Math.max(1, stroke.width / 2), 0, Math.PI * 2);
        context.fill();
        context.restore();
      }

      function continueStroke(event) {
        if (!drawing || !currentStroke) return;
        event.preventDefault();

        const point = getCanvasPoint(event, canvas);

        context.save();
        context.globalCompositeOperation = currentStroke.tool === "eraser" ? "destination-out" : "source-over";
        context.strokeStyle = currentStroke.tool === "eraser" ? "rgba(0,0,0,1)" : currentStroke.color;
        context.lineWidth = currentStroke.width;
        context.beginPath();
        context.moveTo(lastPoint.x, lastPoint.y);
        context.lineTo(point.x, point.y);
        context.stroke();
        context.restore();

        currentStroke.points.push(point);
        lastPoint = point;
      }

      function endStroke(event) {
        if (!drawing) return;
        drawing = false;
        currentStroke = null;

        if (event && event.pointerId !== undefined) {
          try {
            if (canvas.hasPointerCapture(event.pointerId)) canvas.releasePointerCapture(event.pointerId);
          } catch (_) {}
        }
      }

      function renderReviewCanvas(strokeData) {
        const reviewCanvas = document.getElementById("reviewCanvas");
        const ctx = reviewCanvas.getContext("2d");
        const ratio = window.devicePixelRatio || 1;
        const rect = reviewCanvas.getBoundingClientRect();
        const width = Math.max(1, rect.width || 200);
        const height = Math.max(1, rect.height || 120);

        reviewCanvas.width = Math.floor(width * ratio);
        reviewCanvas.height = Math.floor(height * ratio);
        prepareContext(ctx, ratio);
        ctx.clearRect(0, 0, width, height);

        if (!strokeData.length) return;

        let maxX = 1;
        let maxY = 1;
        strokeData.forEach((stroke) => {
          (stroke.points || []).forEach((point) => {
            maxX = Math.max(maxX, point.x);
            maxY = Math.max(maxY, point.y);
          });
        });

        const scale = Math.min((width - 10) / maxX, (height - 10) / maxY, 1.35);

        strokeData.forEach((stroke) => {
          if (!stroke.points || !stroke.points.length) return;
          ctx.save();
          ctx.globalCompositeOperation = stroke.tool === "eraser" ? "destination-out" : "source-over";
          ctx.strokeStyle = stroke.tool === "eraser" ? "rgba(0,0,0,1)" : (stroke.color || "#d54d43");
          ctx.lineWidth = Math.max(2, (stroke.width || 5) * scale);
          ctx.beginPath();
          ctx.moveTo(5 + stroke.points[0].x * scale, 5 + stroke.points[0].y * scale);

          if (stroke.points.length === 1) {
            ctx.lineTo(5 + (stroke.points[0].x + .01) * scale, 5 + (stroke.points[0].y + .01) * scale);
          } else {
            stroke.points.slice(1).forEach((point) => {
              ctx.lineTo(5 + point.x * scale, 5 + point.y * scale);
            });
          }

          ctx.stroke();
          ctx.restore();
        });
      }

      function showReview(record, seat) {
        selectedReviewSeat = seat;
        updateTeacherGrid();

        if (!record) {
          reviewEmpty.classList.remove("is-hidden");
          reviewDetail.classList.remove("is-visible");
          return;
        }

        const notes = parseSelectedNotes(record);
        document.getElementById("reviewClass").textContent = record.class_name || "—";
        document.getElementById("reviewSeat").textContent = record.seat_number || "—";
        
        const reviewNotesContainer = document.getElementById("reviewNotes");
        if (notes.length) {
          // Show only note names (Do, Re, Mi...) instead of descriptions in the teacher dashboard
          reviewNotesContainer.innerHTML = notes.map(note => 
            `<span class="block px-3 py-1.5 bg-amber-100 text-amber-900 border border-amber-300 font-bold rounded-xl text-xs truncate max-w-full text-left" title="${note}">${note}</span>`
          ).join("");
        } else {
          reviewNotesContainer.innerHTML = `<span class="text-gray-500 font-bold">—</span>`;
        }

        let parsedStrokes = [];
        try {
          parsedStrokes = record.drawing_strokes ? JSON.parse(record.drawing_strokes) : [];
        } catch (_) {
          parsedStrokes = [];
        }

        renderReviewCanvas(parsedStrokes);

        const submittedAt = record.submitted_at ? new Date(record.submitted_at) : null;
        document.getElementById("reviewTime").textContent =
          submittedAt && !Number.isNaN(submittedAt.getTime())
            ? "Submitted at: " + submittedAt.toLocaleString()
            : "";

        reviewEmpty.classList.add("is-hidden");
        reviewDetail.classList.add("is-visible");
      }

      document.querySelectorAll("#teacherSeatGrid .seat-button").forEach((button) => {
        button.addEventListener("click", () => {
          showReview(recordForReviewSeat(button.dataset.reviewSeat), button.dataset.reviewSeat);
        });
      });

      closeReviewButton.addEventListener("click", () => {
        selectedReviewSeat = "";
        updateTeacherGrid();
        reviewDetail.classList.remove("is-visible");
        reviewEmpty.classList.remove("is-hidden");
      });

      document.querySelectorAll(".color-swatch").forEach((swatch) => {
        swatch.addEventListener("click", () => {
          brushColor = swatch.dataset.color;
          document.querySelectorAll(".color-swatch").forEach((item) => {
            const active = item.dataset.color === brushColor;
            item.classList.toggle("is-active-swatch", active);
            item.setAttribute("aria-checked", String(active));
          });
          setTool("pen");
        });
      });

      penButton.addEventListener("click", () => setTool("pen"));
      eraserButton.addEventListener("click", () => setTool("eraser"));

      clearButton.addEventListener("click", () => {
        strokes = [];
        redrawPracticeCanvas();
      });

      canvas.addEventListener("pointerdown", beginStroke);
      canvas.addEventListener("pointermove", continueStroke);
      canvas.addEventListener("pointerup", endStroke);
      canvas.addEventListener("pointercancel", endStroke);
      canvas.addEventListener("pointerleave", endStroke);

      const dataHandler = {
        onDataChanged(data) {
          records = data;
          updateTeacherGrid();

          if (selectedReviewSeat) {
            showReview(recordForReviewSeat(selectedReviewSeat), selectedReviewSeat);
          }
        }
      };

      if (window.dataSdk) {
        const initResult = await window.dataSdk.init(dataHandler);
        sdkReady = initResult.isOk;

        if (!sdkReady) {
          submitStatus.textContent = "無法連線到 Canva Sheet，請稍後再試。";
          submitStatus.className = "mt-4 min-h-6 font-bold text-[#c44731]";
        }
      } else {
        submitStatus.textContent = "無法連線到 Canva Sheet。";
        submitStatus.className = "mt-4 min-h-6 font-bold text-[#c44731]";
      }

      submitButton.addEventListener("click", async () => {
        const className = classNameInput.value.trim();
        const notes = selectedNotesArray();

        if (!className || !selectedSeat) {
          submitStatus.textContent = "請填寫班級名稱並選擇座號！";
          submitStatus.className = "mt-4 min-h-6 font-bold text-[#c44731]";
          return;
        }

        if (!notes.length) {
          submitStatus.textContent = "請在第三行五線譜點選至少一個音符。";
          submitStatus.className = "mt-4 min-h-6 font-bold text-[#c44731]";
          return;
        }

        if (!sdkReady || !window.dataSdk) {
          submitStatus.textContent = "傳送失敗，請重新整理後再試。";
          submitStatus.className = "mt-4 min-h-6 font-bold text-[#c44731]";
          return;
        }

        const existingRecord = recordForReviewSeat(selectedSeat);

        if (!existingRecord && records.length >= 999) {
          submitStatus.textContent = "Canva Sheet 已滿，請聯絡老師。";
          submitStatus.className = "mt-4 min-h-6 font-bold text-[#c44731]";
          return;
        }

        submitButton.disabled = true;
        submitButton.classList.add("opacity-60", "cursor-not-allowed");
        submitStatus.textContent = "正在傳送作業…";
        submitStatus.className = "mt-4 min-h-6 font-bold text-[#7a5127]";

        const payload = {
          class_name: className,
          seat_number: String(selectedSeat).trim(),
          selected_notes: notes.join(", "),
          drawing_data: strokes.length ? "Contains practice drawing" : "No practice drawing",
          drawing_strokes: JSON.stringify(strokes),
          staff_strokes: JSON.stringify(notes),
          submitted_at: new Date().toISOString()
        };

        const result = existingRecord
          ? await window.dataSdk.update({ __backendId: existingRecord.__backendId, ...payload })
          : await window.dataSdk.create(payload);

        submitButton.disabled = false;
        submitButton.classList.remove("opacity-60", "cursor-not-allowed");

        if (result.isOk) {
          submitStatus.textContent = "😊 已成功傳送給老師！";
          submitStatus.className = "mt-4 min-h-6 text-lg font-bold text-[#27834b]";
        } else {
          submitStatus.textContent = "😢 傳送失敗，請再試一次。";
          submitStatus.className = "mt-4 min-h-6 text-lg font-bold text-[#c44731]";
        }
      });

      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);
      setTool("pen");
      document.querySelector(".color-swatch").classList.add("is-active-swatch");
      renderSelectedNotes();
      updateTeacherGrid();
    });
  </script>
 </body>
</html>
