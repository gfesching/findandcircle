<!doctype html>
<html lang="zh-Hant">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Note Worksheet</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&amp;family=Noto+Sans+TC:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
  <script src="/_sdk/data_sdk.js"></script>
  <style>
    :root {
      --ink: #252016;
      --orange: #e5681b;
      --cream: #fff8e8;
      --paper: #fffdf4;
      --green: #3e9f62;
      --red: #d54d43;
      --line: #d69a42;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      color: var(--ink);
      font-family: "Noto Sans TC", "DM Sans", sans-serif;
    }

    button, canvas { touch-action: none; }

    .worksheet-shell {
      width: 100%;
      min-height: calc(100 * min(var(--vh, 1vh), 1vh));
      position: relative;
      overflow: hidden;
      padding: 28px 18px 44px;
      background:
        radial-gradient(circle at 10% 8%, rgba(255, 235, 177, 0.34) 0 3%, transparent 16%),
        radial-gradient(circle at 84% 22%, rgba(255, 232, 163, 0.28) 0 4%, transparent 18%),
        linear-gradient(145deg, #9d310d 0%, #e36916 28%, #f4b147 59%, #bc3e11 100%);
    }

    .worksheet-shell::before,
    .worksheet-shell::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: .7;
    }

    .worksheet-shell::before {
      width: 340px;
      height: 340px;
      left: -150px;
      bottom: -170px;
      background: rgba(118, 36, 5, .38);
    }

    .worksheet-shell::after {
      width: 260px;
      height: 260px;
      right: -120px;
      top: -80px;
      background: rgba(255, 227, 142, .28);
    }

    .page-content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
    }

    .paper-card {
      position: relative;
      background:
        radial-gradient(circle at 15% 14%, rgba(239, 205, 129, .22), transparent 28%),
        radial-gradient(circle at 85% 90%, rgba(239, 205, 129, .20), transparent 30%),
        var(--paper);
      box-shadow: 0 14px 0 rgba(108, 35, 7, .17), 0 22px 38px rgba(85, 28, 8, .35);
    }

    .paper-card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 2px solid rgba(183, 98, 30, .20);
      border-radius: 24px;
      pointer-events: none;
    }

    .student-field {
      border: 2px dashed var(--line);
      border-radius: 18px;
      padding: 13px 15px;
      background: rgba(255, 244, 201, .8);
    }

    .student-field input {
      width: 100%;
      border: 0;
      border-bottom: 2px solid #b7772b;
      outline: none;
      background: transparent;
      color: #3e2a16;
      padding: 5px 2px;
      font-size: 1rem;
      font-weight: 700;
    }

    .student-field input:focus {
      border-bottom-color: var(--orange);
      box-shadow: 0 3px 0 rgba(229, 104, 27, .14);
    }

    .seat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
      gap: 6px;
    }

    .seat-button {
      min-height: 34px;
      border: 1.5px solid #e4bd76;
      border-radius: 8px;
      background: #fff8de;
      color: #70451d;
      font-weight: 800;
      font-size: 0.85rem;
      transition: transform 150ms ease, background 150ms ease, color 150ms ease, box-shadow 150ms ease;
    }

    .seat-button:hover {
      transform: translateY(-1px);
      background: #ffd982;
    }

    .seat-button.is-selected {
      border-color: #8d310c;
      background: #e5681b;
      color: white;
      box-shadow: 0 2px 0 rgba(128, 47, 13, .25);
    }

    .seat-button.is-submitted {
      background: #dff3dc;
      border-color: #67ad73;
      color: #236238;
    }

    .seat-button.is-selected.is-submitted {
      background: #3e9f62;
      color: white;
      border-color: #236238;
    }

    .music-stage {
      position: relative;
      overflow: hidden;
      border: 2px solid #d39137;
      border-radius: 20px;
      background: #f6cf7c;
      aspect-ratio: 549 / 309;
    }

    .music-stage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .note-target {
      position: absolute;
      width: 5.5%;
      aspect-ratio: 1;
      border: 0;
      background: transparent;
      border-radius: 999px;
      cursor: pointer;
      z-index: 2;
    }

    .note-target::after {
      content: "";
      position: absolute;
      inset: -15%;
      border: clamp(2px, .45vw, 4px) solid #d9342e;
      border-radius: 50%;
      opacity: 0;
      transform: scale(.55) rotate(-10deg);
      transition: opacity 150ms ease, transform 180ms ease;
      box-shadow: 0 0 0 2px rgba(255, 248, 230, .7);
      pointer-events: none;
    }

    .note-target.is-selected::after {
      opacity: 1;
      transform: scale(1) rotate(-10deg);
    }

    .note-target:hover::after,
    .note-target:focus-visible::after {
      opacity: .55;
      transform: scale(.9) rotate(-10deg);
    }

    .draw-area {
      position: relative;
      min-height: 320px;
      overflow: hidden;
      border: 3px dashed #dea247;
      border-radius: 22px;
      background:
        linear-gradient(rgba(255, 252, 239, .78), rgba(255, 252, 239, .78)),
        repeating-linear-gradient(0deg, transparent 0, transparent 30px, rgba(208, 157, 76, .10) 31px, transparent 32px);
    }

    #drawingCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .canvas-message {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: rgba(122, 84, 32, .56);
      text-align: center;
      font-weight: 700;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .canvas-message.is-hidden { opacity: 0; }

    .tool-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 10px 15px;
      border: 2px solid transparent;
      border-radius: 14px;
      font-weight: 800;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }

    .tool-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 14px rgba(98, 54, 10, .18);
    }

    .tool-button.is-active {
      border-color: var(--ink);
      box-shadow: 0 0 0 4px rgba(37, 32, 22, .12);
    }

    .color-swatch.is-active-swatch {
      border-color: #252016 !important;
      transform: scale(1.15);
      box-shadow: 0 4px 6px rgba(0,0,0,.12);
    }

    .review-card {
      min-height: 152px;
    }

    .review-detail {
      display: none;
    }

    .review-detail.is-visible {
      display: block;
    }

    .review-empty.is-hidden {
      display: none;
    }

    button:focus-visible,
    input:focus-visible {
      outline: 3px solid #005fcc;
      outline-offset: 3px;
    }

    @media (max-width: 640px) {
      .worksheet-shell { padding: 16px 10px 30px; }
      .paper-card::before { inset: 7px; }
      .draw-area { min-height: 270px; }
      .seat-button { min-height: 38px; font-size: .9rem; }
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      lucide.createIcons();

      let strokes = []; // Array of lines: each line is { tool, color, width, points: [{x, y}] }
      let currentStroke = null;
      let sdkReady = false;
      let records = [];
      const selectedNotes = new Set();

      function resizeCanvas() {
        const previous = document.createElement("canvas");
        previous.width = canvas.width;
        previous.height = canvas.height;

        if (canvas.width && canvas.height) {
          previous.getContext("2d").drawImage(canvas, 0, 0);
        }

        const rect = drawArea.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(rect.width * ratio));
        canvas.height = Math.max(1, Math.floor(rect.height * ratio));
        canvas.style.width = rect.width + "px";
        canvas.style.height = rect.height + "px";

        context.setTransform(ratio, 0, 0, ratio, 0, 0);
        context.lineCap = "round";
        context.lineJoin = "round";

        // Redraw all saved strokes to accommodate exact scaling on resize
        redrawCanvas();
      }

      function redrawCanvas() {
        context.clearRect(0, 0, canvas.width / (window.devicePixelRatio || 1), canvas.height / (window.devicePixelRatio || 1));
        strokes.forEach(stroke => {
          if (!stroke.points || stroke.points.length === 0) return;
          context.save();
          context.globalCompositeOperation = stroke.tool === "eraser" ? "destination-out" : "source-over";
          context.strokeStyle = stroke.tool === "eraser" ? "rgba(0,0,0,1)" : stroke.color;
          context.lineWidth = stroke.width;
          context.beginPath();
          context.moveTo(stroke.points[0].x, stroke.points[0].y);
          for (let i = 1; i < stroke.points.length; i++) {
            context.lineTo(stroke.points[i].x, stroke.points[i].y);
          }
          context.stroke();
          context.restore();
        });
      }

      function setTool(nextTool) {
        tool = nextTool;
        const isPen = tool === "pen";
        penButton.classList.toggle("is-active", isPen);
        eraserButton.classList.toggle("is-active", !isPen);
        penButton.setAttribute("aria-pressed", String(isPen));
        eraserButton.setAttribute("aria-pressed", String(!isPen));
        canvas.style.cursor = isPen ? "crosshair" : "cell";
      }

      function getPoint(event) {
        const rect = canvas.getBoundingClientRect();
        return { x: event.clientX - rect.left, y: event.clientY - rect.top };
      }

      function startDrawing(event) {
        event.preventDefault();
        drawing = true;
        const pt = getPoint(event);
        lastPoint = pt;
        canvas.setPointerCapture(event.pointerId);
        message.classList.add("is-hidden");

        const brushWidth = tool === "eraser" ? 22 : 5;
        currentStroke = {
          tool: tool,
          color: brushColor,
          width: brushWidth,
          points: [pt]
        };
        strokes.push(currentStroke);
      }

      function draw(event) {
        if (!drawing || !currentStroke) return;
        event.preventDefault();

        const point = getPoint(event);
        context.save();
        context.globalCompositeOperation = tool === "eraser" ? "destination-out" : "source-over";
        context.strokeStyle = tool === "eraser" ? "rgba(0,0,0,1)" : brushColor;
        context.lineWidth = tool === "eraser" ? 22 : 5;
        context.beginPath();
        context.moveTo(lastPoint.x, lastPoint.y);
        context.lineTo(point.x, point.y);
        context.stroke();
        context.restore();

        lastPoint = point;
        currentStroke.points.push(point);
        hasDrawing = true;
      }

      function stopDrawing(event) {
        if (!drawing) return;
        drawing = false;
        if (event && event.pointerId !== undefined && canvas.hasPointerCapture(event.pointerId)) {
          canvas.releasePointerCapture(event.pointerId);
        }
        currentStroke = null;
      }

      function selectStudentSeat(seat) {
        selectedSeat = seat;
        document.querySelectorAll("#studentSeatGrid .seat-button").forEach(button => {
          const active = button.dataset.seat === seat;
          button.classList.toggle("is-selected", active);
          button.setAttribute("aria-checked", String(active));
        });
      }

      function latestRecordsBySeat() {
        const map = new Map();
        records.forEach(record => {
          const key = record.class_name + "|" + record.seat_number;
          const current = map.get(key);
          if (!current || new Date(record.submitted_at) > new Date(current.submitted_at)) {
            map.set(key, record);
          }
        });
        return Array.from(map.values());
      }

      function recordForReviewSeat(seat) {
        const matching = records.filter(record => String(record.seat_number) === String(seat));
        return matching.sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at))[0];
      }

      function updateTeacherGrid() {
        const submittedSeats = new Set(records.map(record => String(record.seat_number)));
        document.querySelectorAll("#teacherSeatGrid .seat-button").forEach(button => {
          const seat = button.dataset.reviewSeat;
          button.classList.toggle("is-submitted", submittedSeats.has(seat));
          button.classList.toggle("is-selected", selectedReviewSeat === seat);
          button.setAttribute("aria-label", submittedSeats.has(seat) ? "座號 " + seat + "，已有繳交，點選查看" : "座號 " + seat + "，尚未繳交");
        });

        submissionCount.textContent = latestRecordsBySeat().length + " / 25";
      }

      function showReview(record, seat) {
        selectedReviewSeat = seat;
        updateTeacherGrid();

        if (!record) {
          reviewEmpty.classList.remove("is-hidden");
          reviewDetail.classList.remove("is-visible");
          return;
        }

        document.getElementById("reviewClass").textContent = record.class_name || "—";
        document.getElementById("reviewSeat").textContent = record.seat_number || "—";
        document.getElementById("reviewNotes").textContent = record.selected_notes || "尚未圈選音符";
        document.getElementById("reviewDrawing").textContent = record.drawing_data || "未使用繪圖區";

        // Render live stroke visualization if records are stored
        const rContainer = document.getElementById("reviewCanvasContainer");
        const rCanvas = document.getElementById("reviewCanvas");
        if (record.drawing_strokes && record.drawing_strokes !== "[]") {
          rContainer.classList.remove("hidden");
          try {
            const parsedStrokes = JSON.parse(record.drawing_strokes);
            const rCtx = rCanvas.getContext("2d");
            
            // Set scale size
            const ratio = window.devicePixelRatio || 1;
            rCanvas.width = 400 * ratio;
            rCanvas.height = 150 * ratio;
            rCanvas.style.width = "100%";
            rCanvas.style.height = "120px";
            rCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
            rCtx.lineCap = "round";
            rCtx.lineJoin = "round";
            rCtx.clearRect(0, 0, 400, 150);

            // Determine boundaries to auto-center the student's work
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            parsedStrokes.forEach(s => {
              (s.points || []).forEach(p => {
                if (s.tool !== "eraser") {
                  if (p.x < minX) minX = p.x;
                  if (p.x > maxX) maxX = p.x;
                  if (p.y < minY) minY = p.y;
                  if (p.y > maxY) maxY = p.y;
                }
              });
            });

            const hasActiveStrokes = minX !== Infinity;
            const sourceW = hasActiveStrokes ? Math.max(50, (maxX - minX)) : canvas.width / ratio;
            const sourceH = hasActiveStrokes ? Math.max(50, (maxY - minY)) : canvas.height / ratio;
            const offsetX = hasActiveStrokes ? minX - 15 : 0;
            const offsetY = hasActiveStrokes ? minY - 15 : 0;
            
            // Calculate scale to fit gracefully inside mini preview bounds
            const scale = Math.min(370 / (sourceW + 30), 120 / (sourceH + 30));

            parsedStrokes.forEach(stroke => {
              if (!stroke.points || stroke.points.length === 0) return;
              rCtx.save();
              rCtx.globalCompositeOperation = stroke.tool === "eraser" ? "destination-out" : "source-over";
              rCtx.strokeStyle = stroke.tool === "eraser" ? "rgba(0,0,0,1)" : stroke.color;
              rCtx.lineWidth = Math.max(2, stroke.width * scale);
              rCtx.beginPath();
              
              const startX = (stroke.points[0].x - offsetX) * scale + 15;
              const startY = (stroke.points[0].y - offsetY) * scale + 15;
              rCtx.moveTo(startX, startY);
              
              for (let i = 1; i < stroke.points.length; i++) {
                const nextX = (stroke.points[i].x - offsetX) * scale + 15;
                const nextY = (stroke.points[i].y - offsetY) * scale + 15;
                rCtx.lineTo(nextX, nextY);
              }
              rCtx.stroke();
              rCtx.restore();
            });
          } catch(e) {
            console.error("Error drawing student strokes:", e);
            rContainer.classList.add("hidden");
          }
        } else {
          rContainer.classList.add("hidden");
        }

        const time = record.submitted_at ? new Date(record.submitted_at) : null;
        document.getElementById("reviewTime").textContent = time && !Number.isNaN(time.getTime())
          ? "送出時間：" + time.toLocaleString("zh-TW")
          : "";

        reviewEmpty.classList.add("is-hidden");
        reviewDetail.classList.add("is-visible");
      }

      document.querySelectorAll(".note-target").forEach(button => {
        button.addEventListener("click", () => {
          const note = button.dataset.note;
          if (selectedNotes.has(note)) {
            selectedNotes.delete(note);
            document.querySelectorAll('.note-target[data-note="' + note + '"]').forEach(item => item.classList.remove("is-selected"));
          } else {
            selectedNotes.add(note);
            document.querySelectorAll('.note-target[data-note="' + note + '"]').forEach(item => item.classList.add("is-selected"));
          }
        });
      });

      document.querySelectorAll("#studentSeatGrid .seat-button").forEach(button => {
        button.addEventListener("click", () => selectStudentSeat(button.dataset.seat));
      });

      document.querySelectorAll("#teacherSeatGrid .seat-button").forEach(button => {
        button.addEventListener("click", () => {
          const seat = button.dataset.reviewSeat;
          showReview(recordForReviewSeat(seat), seat);
        });
      });

      closeReviewButton.addEventListener("click", () => {
        selectedReviewSeat = "";
        updateTeacherGrid();
        reviewDetail.classList.remove("is-visible");
        reviewEmpty.classList.remove("is-hidden");
      });

      document.querySelectorAll(".color-swatch").forEach(swatch => {
        swatch.addEventListener("click", () => {
          brushColor = swatch.dataset.color;
          document.querySelectorAll(".color-swatch").forEach(item => {
            const active = item.dataset.color === brushColor;
            item.classList.toggle("is-active-swatch", active);
            item.setAttribute("aria-checked", String(active));
          });
          setTool("pen");
        });
      });

      penButton.addEventListener("click", () => setTool("pen"));
      eraserButton.addEventListener("click", () => setTool("eraser"));
      clearButton.addEventListener("click", () => {
        context.clearRect(0, 0, canvas.width / (window.devicePixelRatio || 1), canvas.height / (window.devicePixelRatio || 1));
        strokes = [];
        hasDrawing = false;
        message.classList.remove("is-hidden");
      });

      canvas.addEventListener("pointerdown", startDrawing);
      canvas.addEventListener("pointermove", draw);
      canvas.addEventListener("pointerup", stopDrawing);
      canvas.addEventListener("pointercancel", stopDrawing);
      canvas.addEventListener("pointerleave", stopDrawing);

      const dataHandler = {
        onDataChanged(data) {
          records = data;
          updateTeacherGrid();
          if (selectedReviewSeat) {
            showReview(recordForReviewSeat(selectedReviewSeat), selectedReviewSeat);
          }
        }
      };

      if (window.dataSdk) {
        const result = await window.dataSdk.init(dataHandler);
        sdkReady = result.isOk;
        if (!sdkReady) {
          submitStatus.textContent = "目前無法連線，請稍後再試。";
          submitStatus.className = "mt-4 min-h-6 font-bold text-[#c44731]";
        }
      }

      submitButton.addEventListener("click", async () => {
        const className = classNameInput.value.trim();

        if (!className || !selectedSeat) {
          submitStatus.textContent = "請先填寫班級並選擇座號，再送出學習單。";
          submitStatus.className = "mt-4 min-h-6 font-bold text-[#c44731]";
          return;
        }

        if (!sdkReady) {
          submitStatus.textContent = "目前無法送出，請稍後再試。";
          submitStatus.className = "mt-4 min-h-6 font-bold text-[#c44731]";
          return;
        }

        const matchingRecords = records.filter(record =>
          record.class_name === className && String(record.seat_number) === String(selectedSeat)
        );

        if (records.length >= 999 && matchingRecords.length === 0) {
          submitStatus.textContent = "已達到可儲存的學習單上限，請通知老師。";
          submitStatus.className = "mt-4 min-h-6 font-bold text-[#c44731]";
          return;
        }

        submitButton.disabled = true;
        submitButton.classList.add("opacity-60", "cursor-not-allowed");
        submitStatus.textContent = "正在送出學習單…";
        submitStatus.className = "mt-4 min-h-6 font-bold text-[#7a5127]";

        const latestMatch = matchingRecords.sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at))[0];
        const payload = {
          class_name: className,
          seat_number: selectedSeat,
          selected_notes: Array.from(selectedNotes).join("、"),
          drawing_data: hasDrawing ? "已完成繪圖或書寫" : "未使用繪圖區",
          drawing_strokes: JSON.stringify(strokes),
          submitted_at: new Date().toISOString()
        };

        let result;
        if (latestMatch) {
          result = await window.dataSdk.update({ ...latestMatch, ...payload });
        } else {
          result = await window.dataSdk.create(payload);
        }

        submitButton.disabled = false;
        submitButton.classList.remove("opacity-60", "cursor-not-allowed");

        if (result.isOk) {
          submitStatus.textContent = "完成！老師已收到你的學習單。";
          submitStatus.className = "mt-4 min-h-6 font-bold text-[#27834b]";
        } else {
          submitStatus.textContent = "送出失敗，請檢查網路後再試一次。";
          submitStatus.className = "mt-4 min-h-6 font-bold text-[#c44731]";
        }
      });

      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);
      setTool("pen");
      document.querySelector(".color-swatch").classList.add("is-active-swatch");
      updateTeacherGrid();
    });
  </script>
 </body>
</html>
